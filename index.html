<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gedgov - BI Executivo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #ffffff;
        }
        /* O Segredo: O container esconde os 50px da direita e de baixo onde ficam os botões do Streamlit */
        .wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: calc(100% + 40px); /* Joga o widget do GitHub para fora da tela */
            height: calc(100% + 50px); /* Joga rodapés residuais para fora da tela */
            overflow: hidden;
        }
        iframe {
            width: calc(100% - 40px);
            height: calc(100% - 50px);
            border: none;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <iframe src="https://gedgov-dashboard.streamlit.app"></iframe>
    </div>
</body>
</html>
