<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gedgov — Entrar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --brand: #1D4B8F;
            --brand-soft: #e8eef7;
            --accent: #F2C100;
            --bg: #f4f6fa;
            --ink: #1f2933;
            --muted: #6b7480;
            --line: #e6e9ef;
            --card: #ffffff;
        }
        * { box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--ink);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }

        .login-card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 36px 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 24px rgba(16,24,40,.08);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
            justify-content: center;
        }
        .brand img { max-height: 46px; object-fit: contain; }
        .brand .name { font-weight: 700; color: var(--brand); font-size: 20px; line-height: 1; }
        .brand .tag { font-size: 12px; color: var(--muted); }

        .login-title {
            font-size: 18px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 6px;
        }
        .login-sub {
            font-size: 13px;
            color: var(--muted);
            text-align: center;
            margin-bottom: 24px;
        }

        .form-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--ink);
            margin-bottom: 5px;
        }
        .form-control {
            border-color: var(--line);
            border-radius: 8px;
            font-size: 14px;
            padding: .55rem .75rem;
        }
        .form-control:focus {
            border-color: var(--brand);
            box-shadow: 0 0 0 .2rem rgba(29,75,143,.12);
        }
        .input-group-text {
            background: #fafbfd;
            border-color: var(--line);
            color: var(--muted);
        }

        .btn-login {
            background: var(--brand);
            color: #fff;
            border: 0;
            border-radius: 8px;
            font-weight: 600;
            font-size: 15px;
            padding: .6rem;
            width: 100%;
            margin-top: 8px;
            transition: background .15s;
        }
        .btn-login:hover { background: #163d7a; color: #fff; }

        .alert-erro {
            background: #fbe6e6;
            color: #b91c1c;
            border: 1px solid #f5c6c6;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13.5px;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .footer-txt {
            margin-top: 28px;
            font-size: 12px;
            color: var(--muted);
            text-align: center;
        }

        .toggle-pass {
            cursor: pointer;
            border-left: 0;
            background: #fafbfd;
            border-color: var(--line);
        }
        .toggle-pass:hover { color: var(--brand); }
    </style>
</head>
<body>

    <div class="login-card">

        <div class="brand">
            <img src="/static/logo.png" alt="Logo Gedgov">
            <div>
                <div class="name">Gedgov</div>
                <div class="tag">BI Orçamentário Executivo</div>
            </div>
        </div>

        <div class="login-title">Acesso ao Portal</div>
        <div class="login-sub">Entre com suas credenciais para continuar</div>

        {% if erro %}
        <div class="alert-erro">
            <i class="bi bi-exclamation-circle-fill"></i>
            {{ erro }}
        </div>
        {% endif %}

        <form method="POST" action="/login" autocomplete="on">
            <div class="mb-3">
                <label for="username" class="form-label">Usuário</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input
                        type="text"
                        class="form-control"
                        id="username"
                        name="username"
                        placeholder="seu.usuario"
                        autocomplete="username"
                        required
                        autofocus
                    >
                </div>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Senha</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input
                        type="password"
                        class="form-control"
                        id="password"
                        name="password"
                        placeholder="••••••••"
                        autocomplete="current-password"
                        required
                    >
                    <button type="button" class="btn btn-outline-secondary toggle-pass" onclick="toggleSenha()" tabindex="-1">
                        <i class="bi bi-eye" id="iconOlho"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-login">
                <i class="bi bi-box-arrow-in-right me-1"></i> Entrar
            </button>
        </form>

    </div>

    <div class="footer-txt">
        © Gedgov — Gestão Orçamentária Inteligente
    </div>

    <script>
        function toggleSenha() {
            const inp = document.getElementById('password');
            const ico = document.getElementById('iconOlho');
            if (inp.type === 'password') {
                inp.type = 'text';
                ico.className = 'bi bi-eye-slash';
            } else {
                inp.type = 'password';
                ico.className = 'bi bi-eye';
            }
        }
    </script>

</body>
</html>
